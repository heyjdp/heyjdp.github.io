baseURL: "https://heyjdp.github.io/"
languageCode: en-us
title: "Dr Dave Powell"
theme: hugo-PaperMod-5.0
publishDir: "docs"
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

permalinks:
  posts: /:year/:month/:title/

#googleAnalytics: UA-123-45

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: "Dave Powell"
  description: "Mainly technology notes Jas, aka heyjdp, a computerphile living on the island of Cyprus in the Mediterranean."
  keywords: ["blog", "computing", "security", "technology", "notes"]
  author: Dave
  # author: ["Me", "You"] # multiple authors
#  images: ["<link or path of image for opengraph, twitter-cards>"]
  images: ["/post-img/post-placeholder-1200x630.jpg"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  label:
    text: "Dave Powell"
    icon: /apple-touch-icon.png
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: true # needs to be explicitly set
    title: "Tech Notes, Mainly Linux \u2728"
    subtitle: "Wrangles bytes for chocolate digestives &#128187; &#128241; &#128105;&#8205;&#128187;"
    imageUrl: "/heyjdp-avatar.jpeg"
    imageWidth: 240
    imageHeight: 240
    imageTitle: heyjdp
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags

  # home-info mode
  homeInfoParams:
    Title: "heyjdp \U0001F44B"
    Content: Welcome to my blog

  socialIcons:
    - name: github
      url: "https://github.com/heyjdp"
    - name: stackoverflow
      url: "https://stackoverflow.com/users/18483983/heyjdp"
    - name: twitter
      url: "https://twitter.com/heyjdp"
    - name: email
      url: "mailto:dave@davepowell.net"

#  analytics:
#    google:
#      SiteVerificationTag: "XYZabc"
#    bing:
#      SiteVerificationTag: "XYZabc"
#    yandex:
#      SiteVerificationTag: "XYZabc"

  summaryLength: 120

  cover:
    hidden: false # hide everywhere but not in structured data
    hiddenInList: false # hide on list pages and home
    hiddenInSingle: false # hide on single page

  editPost:
    URL: "https://github.com/heyjdp/heyjdp.github.io/tree/main/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

menu:
  main:
    - identifier: about
      name: About
      url: /about
      weight: 10
    - identifier: resume
      name: Resume
      url: https://registry.jsonresume.org/heyjdp?theme=kendall
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: home
      name: Home
      url: https://heyjdp.github.io
      weight: 40